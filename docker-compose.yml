services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: save-serve-postgres
    environment:
      POSTGRES_DB: save_serve
      POSTGRES_USER: save_serve
      POSTGRES_PASSWORD: save_serve
    ports:
      - "5432:5432"
    volumes:
      - save_serve_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U save_serve -d save_serve"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: save-serve-redis
    ports:
      - "6379:6379"
    volumes:
      - save_serve_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  save_serve_postgres:
  save_serve_redis:

